- pipeline: lint-check
  name: Lint check
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  resources: NANO
  events:
  - type: WEBHOOK
  - type: PULL_REQUEST
    events:
    - edited
    - opened
    branches:
    - '*'
  actions:
  - action: pnpm lint
    type: BUILD
    execute_commands:
    - "# yarn install"
    - corepack enable
    - pnpm install
    - pnpm lint
    shell: BASH
    docker_image_name: library/node
    docker_image_tag: 24
